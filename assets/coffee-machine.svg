<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">

  <!-- MACHINE BODY — rounded, chunky espresso machine -->
  <!-- Main body -->
  <rect x="30" y="60" width="140" height="160" fill="#2a2a2a" rx="14"/>
  <!-- front face panel -->
  <rect x="36" y="66" width="128" height="148" fill="#323232" rx="10"/>
  <!-- top rounded cap -->
  <rect x="30" y="60" width="140" height="30"  fill="#1e1e1e" rx="14"/>
  <rect x="30" y="75" width="140" height="15"  fill="#1e1e1e"/>

  <!-- WATER TANK — smoked glass on top -->
  <rect x="52" y="18" width="96" height="46" fill="#3a4a5a" rx="8"/>
  <rect x="54" y="20" width="92" height="42" fill="#4a6a80" rx="7" opacity="0.7"/>
  <!-- water level line -->
  <rect x="56" y="44" width="88" height="2"  fill="#6a9ab8" opacity="0.6"/>
  <!-- water shimmer -->
  <ellipse cx="100" cy="36" rx="30" ry="8" fill="#80b8d8" opacity="0.25"/>
  <rect x="54" y="20" width="92" height="42" fill="none" stroke="#5a7a90" stroke-width="1.5" rx="7"/>
  <!-- tank label -->
  <rect x="72" y="30" width="56" height="18" fill="#2a3a48" rx="4" opacity="0.7"/>
  <rect x="76" y="34" width="16" height="3" fill="#6a9ab0" rx="1" opacity="0.8"/>
  <rect x="76" y="40" width="24" height="2" fill="#6a9ab0" rx="1" opacity="0.6"/>

  <!-- TOP DRIP TRAY SPOUT -->
  <rect x="86" y="62" width="28" height="6" fill="#1a1a1a" rx="3"/>

  <!-- BRAND BADGE -->
  <rect x="62" y="72" width="76" height="22" fill="#1a1a1a" rx="6"/>
  <rect x="64" y="74" width="72" height="18" fill="#c8906a" rx="5" opacity="0.15"/>
  <text x="100" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c8906a" font-style="italic" opacity="0.9">espresso</text>

  <!-- DISPLAY SCREEN -->
  <rect x="46" y="100" width="108" height="42" fill="#0a1a0a" rx="6"/>
  <rect x="48" y="102" width="104" height="38" fill="#0d2010" rx="5"/>
  <!-- screen content — cup icons -->
  <circle cx="72"  cy="121" r="10" fill="none" stroke="#40c040" stroke-width="1.5" opacity="0.8"/>
  <path d="M67,121 Q72,116 77,121" stroke="#40c040" stroke-width="1.2" fill="none" opacity="0.7"/>
  <circle cx="100" cy="121" r="10" fill="none" stroke="#40c040" stroke-width="1.5" opacity="0.8"/>
  <path d="M95,121 Q100,115 105,121" stroke="#40c040" stroke-width="1.2" fill="none" opacity="0.7"/>
  <circle cx="128" cy="121" r="10" fill="none" stroke="#40c040" stroke-width="1.5" opacity="0.5"/>
  <path d="M123,121 Q128,115 133,121" stroke="#40c040" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- active indicator -->
  <circle cx="72" cy="121" r="3" fill="#40c040" opacity="0.9"/>

  <!-- CONTROL BUTTONS ROW -->
  <rect x="46" y="150" width="108" height="22" fill="#1a1a1a" rx="5"/>
  <!-- button 1 — single shot -->
  <circle cx="65"  cy="161" r="7" fill="#2a2a2a"/>
  <circle cx="65"  cy="161" r="5" fill="#c87840"/>
  <circle cx="63"  cy="159" r="1.5" fill="#e0a060" opacity="0.7"/>
  <!-- button 2 — double shot -->
  <circle cx="88"  cy="161" r="7" fill="#2a2a2a"/>
  <circle cx="88"  cy="161" r="5" fill="#c87840"/>
  <circle cx="86"  cy="159" r="1.5" fill="#e0a060" opacity="0.7"/>
  <!-- button 3 — lungo -->
  <circle cx="112" cy="161" r="7" fill="#2a2a2a"/>
  <circle cx="112" cy="161" r="5" fill="#3a3a3a"/>
  <circle cx="110" cy="159" r="1.5" fill="#606060" opacity="0.7"/>
  <!-- button 4 — steam -->
  <circle cx="135" cy="161" r="7" fill="#2a2a2a"/>
  <circle cx="135" cy="161" r="5" fill="#3a3a3a"/>
  <circle cx="133" cy="159" r="1.5" fill="#606060" opacity="0.7"/>

  <!-- PORTAFILTER GROUP -->
  <!-- group handle arm -->
  <rect x="58" y="178" width="84" height="10" fill="#1a1a1a" rx="5"/>
  <!-- portafilter body -->
  <ellipse cx="100" cy="188" rx="32" ry="6" fill="#282828"/>
  <ellipse cx="100" cy="188" rx="28" ry="4" fill="#1a1a1a"/>
  <!-- spouts -->
  <path d="M88,192 Q86,200 84,204" stroke="#282828" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M88,192 Q86,200 84,204" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M112,192 Q114,200 116,204" stroke="#282828" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M112,192 Q114,200 116,204" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- handle -->
  <rect x="128" y="182" width="38" height="10" fill="#3a2a1a" rx="5"/>
  <rect x="130" y="184" width="34" height="6"  fill="#5a3a20" rx="4"/>

  <!-- DRIP TRAY -->
  <rect x="36" y="208" width="128" height="8"  fill="#1a1a1a" rx="3"/>
  <rect x="38" y="210" width="124" height="4"  fill="#282828" rx="2"/>
  <!-- tray grate -->
  <rect x="40" y="216" width="120" height="8"  fill="#1e1e1e" rx="2"/>
  <line x1="52"  y1="216" x2="52"  y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="64"  y1="216" x2="64"  y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="76"  y1="216" x2="76"  y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="88"  y1="216" x2="88"  y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="100" y1="216" x2="100" y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="112" y1="216" x2="112" y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="124" y1="216" x2="124" y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="136" y1="216" x2="136" y2="224" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="148" y1="216" x2="148" y2="224" stroke="#2a2a2a" stroke-width="1"/>

  <!-- COFFEE CUP on tray -->
  <rect x="82" y="200" width="36" height="24" fill="#f0e8d8" rx="3"/>
  <rect x="84" y="202" width="32" height="20" fill="#e8dcc8" rx="2"/>
  <!-- espresso shot in cup -->
  <ellipse cx="100" cy="212" rx="12" ry="7" fill="#6a3010" opacity="0.9"/>
  <ellipse cx="100" cy="210" rx="10" ry="4" fill="#c07030" opacity="0.6"/>
  <!-- cup handle -->
  <path d="M118,203 Q126,207 118,215" stroke="#d8cbb8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- STEAM WAND — right side -->
  <rect x="152" y="140" width="6"  height="50" fill="#1e1e1e" rx="3"/>
  <rect x="148" y="186" width="14" height="6"  fill="#282828" rx="3"/>
  <rect x="151" y="192" width="5"  height="14" fill="#1a1a1a" rx="2"/>
  <ellipse cx="153" cy="207" rx="4" ry="3" fill="#282828"/>

  <!-- MACHINE FEET -->
  <rect x="40"  y="218" width="14" height="8" fill="#1a1a1a" rx="3"/>
  <rect x="146" y="218" width="14" height="8" fill="#1a1a1a" rx="3"/>

  <!-- STEAM ANIMATION from cup and wand -->
  <g id="steam1" opacity="0.7">
    <path d="M93,199 Q91,191 94,184 Q97,177 95,170" stroke="#d0d0d0" stroke-width="2" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.4s" repeatCount="indefinite"/>
  </g>
  <g id="steam2" opacity="0.5">
    <path d="M100,199 Q102,190 99,183 Q96,176 99,169" stroke="#d0d0d0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0.5;0.05;0.5" dur="3s" repeatCount="indefinite" begin="0.8s"/>
  </g>
  <g id="steam3" opacity="0.4">
    <path d="M107,199 Q109,192 106,185 Q103,179 106,173" stroke="#d0d0d0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
    <animate attributeName="opacity" values="0.4;0.05;0.4" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
  </g>
  <!-- steam from wand -->
  <g id="steam4" opacity="0.5">
    <path d="M153,193 Q156,186 153,180 Q150,174 153,168" stroke="#d0d0d0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="2s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="0.5;0.05;0.5" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </g>

  <!-- MACHINE SIDE ACCENT — subtle warm strip -->
  <rect x="30" y="90"  width="6"  height="100" fill="#c87840" rx="3" opacity="0.4"/>
  <rect x="164" y="90" width="6"  height="100" fill="#c87840" rx="3" opacity="0.4"/>

</svg>